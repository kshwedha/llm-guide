<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Complete LLM Engineering</title>
  <meta name="description" content="A comprehensive engineering guide to large language models — from transformer internals to production agents.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">

  <!-- KaTeX (math) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">

  <!-- Prism (code) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/reader.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__brand">
        <div class="header__logo">L</div>
        <div class="header__title">LLM Engineering Bible <small>· Reader</small></div>
      </div>
      <div class="header__spacer"></div>
      <input id="search-input" class="header__search" type="search" placeholder="Search the guide…" autocomplete="off">
      <a href="visuals/index.html" class="header__btn header__btn--primary">Visualizations →</a>
      <button id="theme-toggle" class="header__btn" type="button">☾ Dark</button>
    </header>

    <nav class="sidebar" aria-label="Table of contents">
      <ul id="sidebar-list" class="sidebar__list">
        <li class="sidebar__loading">Loading table of contents…</li>
      </ul>
      <div class="sidebar__footer">
        <strong>Tip</strong> · use the search box above to filter sections.<br><br>
        <a href="visuals/index.html">Open the visualization gallery →</a>
      </div>
    </nav>

    <main class="main">
      <article id="content" class="content">
        <div class="content__loading">Loading the guide…</div>
      </article>
    </main>
  </div>

  <!-- Inline markdown bucket (filled by build.py for standalone.html). Empty by default. -->
  <script id="inline-markdown" type="text/plain"></script>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>

  <!-- KaTeX renderer + auto-render -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <!-- Reader -->
  <script src="assets/js/reader.js"></script>
</body>
</html>
